kind = "web"
previewPath = "/community-platform/"
title = "Community Platform"
version = "1.0.0"
id = "artifacts/community-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/community-platform/" ]
localPort = 5001

[services.development]
run = "pnpm --filter @workspace/community-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/community-platform", "run", "build" ]
publicDir = "artifacts/community-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5001"
BASE_PATH = "/community-platform/"
