kind = "web"
previewPath = "/community-platform/"
title = "Community Platform"
version = "1.0.0"
id = "artifacts/community-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/community-platform/", "/sites" ]
localPort = 5001

[services.development]
run = "pnpm --filter @workspace/community-platform run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/community-platform", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["sh", "-c", "fuser -k 5001/tcp 2>/dev/null || true; sleep 0.5; exec node --enable-source-maps artifacts/community-platform/dist/server/server.mjs"]

[services.production.run.env]
PORT = "5001"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"

[services.env]
PORT = "5001"
BASE_PATH = "/community-platform/"
