<svg width="380" height="80" viewBox="0 0 380 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon square -->
  <rect x="0" y="0" width="80" height="80" rx="18" fill="#12203d"/>

  <!-- Gavel mark inside icon, rotated -35deg -->
  <g transform="rotate(-35, 40, 40)">
    <rect x="10" y="23" width="60" height="17" rx="5" fill="#e8b84b"/>
    <rect x="32" y="39" width="16" height="7" rx="3" fill="#c9a03e"/>
    <rect x="34" y="44" width="12" height="30" rx="5" fill="#e8b84b"/>
  </g>
  <!-- Strike accent inside icon -->
  <rect x="8" y="64" width="36" height="4" rx="2" fill="#e8b84b" opacity="0.4"/>

  <!-- Wordmark text -->
  <!-- "gavel" in clean geometric lowercase -->
  <text
    x="104"
    y="52"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="700"
    font-size="38"
    letter-spacing="-1.5"
    fill="#12203d"
  >gavel</text>

  <!-- Gold accent dot after the text -->
  <circle cx="290" cy="44" r="5" fill="#e8b84b"/>
</svg>
