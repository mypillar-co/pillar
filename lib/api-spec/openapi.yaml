openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Steward SaaS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: organizations
    description: Organization management
  - name: billing
    description: Subscription and billing operations
  - name: events
    description: Event management (Tier 2+). Includes ticket types, sales, approvals, communications, and recurring templates.
  - name: social
    description: Social media automation (Tier 1a+). Accounts, posts, automation rules, content strategy, and OAuth flows.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /tiers:
    get:
      operationId: listTiers
      tags: [billing]
      summary: List subscription tiers
      responses:
        "200":
          description: List of subscription tiers
          content:
            application/json:
              schema:
                type: object
                required: [tiers]
                properties:
                  tiers:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tier"
  /billing/checkout:
    post:
      operationId: createCheckoutSession
      tags: [billing]
      summary: Create a Stripe checkout session for a tier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutRequest"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /billing/portal:
    post:
      operationId: createPortalSession
      tags: [billing]
      summary: Create a Stripe billing portal session
      responses:
        "200":
          description: Portal session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSessionResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /billing/subscription:
    get:
      operationId: getSubscription
      tags: [billing]
      summary: Get current subscription status
      responses:
        "200":
          description: Current subscription info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatusResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /organizations:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get the current user's organization
      responses:
        "200":
          description: Organization info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create or update an organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertOrganizationRequest"
      responses:
        "200":
          description: Organization created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events for the current org (with per-event quick stats)
      description: Requires Tier 2+. Returns events enriched with totalSold and totalRevenue (sum of amountPaid per event).
      parameters:
        - name: includeInactive
          in: query
          required: false
          schema:
            type: string
            enum: ["0", "1"]
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventItem"
        "403":
          description: Tier 2+ required
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event
      description: Requires Tier 2+.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventItem"
  /events/metrics:
    get:
      operationId: getEventMetrics
      tags: [events]
      summary: Get aggregate event metrics for the org
      description: Requires Tier 2+. Revenue = sum(amountPaid) across all ticket sales.
      responses:
        "200":
          description: Event metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventMetrics"
  /events/approvals/queue:
    get:
      operationId: getApprovalQueue
      tags: [events]
      summary: Get pending event approval queue
      description: Requires Tier 2+.
      responses:
        "200":
          description: Pending approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovalQueueItem"
  /events/recurring/templates:
    get:
      operationId: listRecurringTemplates
      tags: [events]
      summary: List recurring event templates
      description: Requires Tier 3.
      responses:
        "200":
          description: Recurring templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecurringTemplate"
    post:
      operationId: createRecurringTemplate
      tags: [events]
      summary: Create a recurring event template
      description: Requires Tier 3.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecurringTemplateRequest"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringTemplate"
  /events/recurring/templates/{id}:
    put:
      operationId: updateRecurringTemplate
      tags: [events]
      summary: Update a recurring event template
      description: Requires Tier 3.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecurringTemplateRequest"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringTemplate"
    delete:
      operationId: deleteRecurringTemplate
      tags: [events]
      summary: Delete a recurring event template
      description: Requires Tier 3.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /events/recurring/templates/{id}/generate:
    post:
      operationId: generateEventFromTemplate
      tags: [events]
      summary: Manually generate the next event occurrence from a recurring template
      description: Requires Tier 3. Uses AI to write a unique event description (falls back to template description if AI is unavailable).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Generated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventItem"
  /events/public/{orgSlug}:
    get:
      operationId: getPublicEvents
      tags: [events]
      summary: Get published events for a public org page (no auth required)
      parameters:
        - name: orgSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Published events
          content:
            application/json:
              schema:
                type: object
                required: [events, orgName]
                properties:
                  orgName:
                    type: string
                    description: Display name of the organization
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/EventItem"
  /events/{id}:
    get:
      operationId: getEventDetail
      tags: [events]
      summary: Get event detail with ticket types, sales, approvals, and communications
      description: Requires Tier 2+. All related data is scoped to the org.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"
        "404":
          description: Event not found
    put:
      operationId: updateEvent
      tags: [events]
      summary: Update an event
      description: Requires Tier 2+.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventItem"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete (deactivate) an event
      description: Requires Tier 2+.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
  /events/{id}/submit:
    post:
      operationId: submitEventForApproval
      tags: [events]
      summary: Submit a draft event for approval
      description: Requires Tier 2+.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event submitted
  /events/{id}/approve:
    post:
      operationId: approveEvent
      tags: [events]
      summary: Approve a pending event (org owner only)
      description: Requires Tier 2+. Only the org owner can approve.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventApprovalCommentRequest"
      responses:
        "200":
          description: Approved
  /events/{id}/reject:
    post:
      operationId: rejectEvent
      tags: [events]
      summary: Reject a pending event (org owner only)
      description: Requires Tier 2+. Only the org owner can reject.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventApprovalCommentRequest"
      responses:
        "200":
          description: Rejected
  /events/{id}/ticket-types:
    get:
      operationId: listTicketTypes
      tags: [events]
      summary: List ticket types for an event
      description: Requires Tier 2+. Scoped to (eventId, orgId).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketType"
    post:
      operationId: createTicketType
      tags: [events]
      summary: Create a ticket type for an event
      description: Requires Tier 2+. Verifies event belongs to the org before inserting.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketTypeRequest"
      responses:
        "201":
          description: Created ticket type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketType"
  /events/{eventId}/ticket-types/{typeId}:
    put:
      operationId: updateTicketType
      tags: [events]
      summary: Update a ticket type
      description: Requires Tier 2+. Scoped to (eventId, orgId).
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
        - name: typeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketTypeRequest"
      responses:
        "200":
          description: Updated ticket type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketType"
    delete:
      operationId: deleteTicketType
      tags: [events]
      summary: Delete a ticket type
      description: Requires Tier 2+. Scoped to (eventId, orgId).
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
        - name: typeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /events/{id}/sales:
    get:
      operationId: listTicketSales
      tags: [events]
      summary: List ticket sales for an event
      description: Requires Tier 2+.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketSale"
    post:
      operationId: recordTicketSale
      tags: [events]
      summary: Record a ticket sale for an event
      description: Requires Tier 2+. amountPaid is the total transaction amount (not per-ticket).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordTicketSaleRequest"
      responses:
        "201":
          description: Sale recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketSale"
  /events/{eventId}/sales/{saleId}:
    delete:
      operationId: deleteTicketSale
      tags: [events]
      summary: Delete a ticket sale record
      description: Requires Tier 2+. Scoped to org.
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
        - name: saleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /events/{id}/communications:
    get:
      operationId: listEventCommunications
      tags: [events]
      summary: List communications sent for an event
      description: Requires Tier 2+.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Communications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventCommunication"
    post:
      operationId: sendEventCommunication
      tags: [events]
      summary: Send a communication to event attendees
      description: Requires Tier 2+.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendCommunicationRequest"
      responses:
        "201":
          description: Communication recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventCommunication"

  # ─── Social Media ────────────────────────────────────────────────
  /social/oauth/{platform}/start:
    get:
      operationId: startSocialOAuth
      tags: [social]
      summary: Initiate OAuth flow for a social platform
      description: Returns an authUrl to redirect the user to, or manualConnect:true if OAuth is not configured.
      parameters:
        - in: path
          name: platform
          required: true
          schema:
            type: string
            enum: [facebook, instagram, twitter]
      responses:
        "200":
          description: OAuth start result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthStartResult"

  /social/accounts:
    get:
      operationId: listSocialAccounts
      tags: [social]
      summary: List connected social accounts
      responses:
        "200":
          description: List of social accounts (tokens excluded)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialAccount"
    post:
      operationId: connectSocialAccount
      tags: [social]
      summary: Manually connect a social account using a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectSocialAccountRequest"
      responses:
        "201":
          description: Account connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialAccount"

  /social/accounts/{id}:
    delete:
      operationId: disconnectSocialAccount
      tags: [social]
      summary: Disconnect (delete) a social account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Disconnected

  /social/posts:
    get:
      operationId: listSocialPosts
      tags: [social]
      summary: List social posts
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, scheduled, published, failed, cancelled]
      responses:
        "200":
          description: Posts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialPost"
    post:
      operationId: createSocialPost
      tags: [social]
      summary: Create a social post (draft or scheduled)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSocialPostRequest"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialPost"

  /social/posts/generate:
    post:
      operationId: generateSocialPostContent
      tags: [social]
      summary: AI-generate post content for a platform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateSocialPostRequest"
      responses:
        "200":
          description: Generated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedPostContent"

  /social/posts/{id}:
    put:
      operationId: updateSocialPost
      tags: [social]
      summary: Edit an unpublished post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSocialPostRequest"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialPost"
    delete:
      operationId: deleteSocialPost
      tags: [social]
      summary: Delete or cancel a post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted or cancelled

  /social/rules:
    get:
      operationId: listAutomationRules
      tags: [social]
      summary: List automation rules
      responses:
        "200":
          description: Rules list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationRule"
    post:
      operationId: createAutomationRule
      tags: [social]
      summary: Create an automation rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAutomationRuleRequest"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"

  /social/rules/{id}:
    put:
      operationId: updateAutomationRule
      tags: [social]
      summary: Update an automation rule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAutomationRuleRequest"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"
    delete:
      operationId: deleteAutomationRule
      tags: [social]
      summary: Delete an automation rule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /social/strategy:
    get:
      operationId: getContentStrategy
      tags: [social]
      summary: Get Tier 3 content strategy (null if not set)
      responses:
        "200":
          description: Content strategy or null
          content:
            application/json:
              schema:
                nullable: true
                allOf:
                  - $ref: "#/components/schemas/ContentStrategy"
    put:
      operationId: updateContentStrategy
      tags: [social]
      summary: Update Tier 3 content strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContentStrategyRequest"
      responses:
        "200":
          description: Updated strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentStrategy"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
