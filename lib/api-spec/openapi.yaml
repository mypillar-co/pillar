        totalRevenue:
          type: number
          description: Total revenue in USD (sum of amountPaid). amountPaid is the total transaction amount per sale, not per-ticket.
    EventDetail:
      type: object
      required: [event, ticketTypes, sales, approvals, communications, totalRevenue, totalSold]
      properties:
